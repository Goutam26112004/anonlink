name: CI/CD Deployment Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup NodeJS Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Monorepo Dependencies
        run: npm ci

      - name: Generate Prisma Client Types
        run: npm run prisma:generate --workspace=backend || true

      - name: Run Backend Compilation
        run: npm run build --workspace=backend

      - name: Run Frontend NextJS Compilation
        run: npm run build --workspace=frontend

      - name: Run Verification Test Suites
        run: |
          node tests/verify.js
          node tests/matchmaker.test.js
          node tests/admin.test.js
          node tests/gamification.test.js
          node tests/security.test.js

      - name: Run Vitest Unit Tests
        run: npm test --workspace=backend

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: 132.226.190.112
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /home/ubuntu/anon-chat-platform
            git stash
            git pull origin main
            git stash drop || true
            sudo docker compose down
            sudo docker compose build --no-cache
            sudo docker compose up -d
            sudo docker image prune -f
