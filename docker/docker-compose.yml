version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: anon-chat-postgres
    environment:
      POSTGRES_DB: anon_chat
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: securepassword123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - chat-network

  redis:
    image: redis:7-alpine
    container_name: anon-chat-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - chat-network

  coturn:
    image: coturn/coturn:latest
    container_name: anon-chat-coturn
    ports:
      - "3478:3478/udp"
      - "3478:3478/tcp"
      - "5349:5349/udp"
      - "5349:5349/tcp"
    environment:
      - DETECT_EXTERNAL_IP=yes
    command:
      - -n
      - -r=anonchat.net
      - -u=user:password
      - --no-stdout-log
    networks:
      - chat-network

  backend:
    build:
      context: ..
      dockerfile: docker/production/backend.Dockerfile
    container_name: anon-chat-backend
    environment:
      - PORT=4000
      - DATABASE_URL=postgresql://postgres:securepassword123@postgres:5432/anon_chat
      - REDIS_URL=redis://redis:6379
      - CLIENT_URL=http://localhost:3000
      - JWT_SECRET=supersecretkey123
    ports:
      - "4000:4000"
    depends_on:
      - postgres
      - redis
    networks:
      - chat-network

  nginx:
    image: nginx:alpine
    container_name: anon-chat-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./production/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    networks:
      - chat-network

volumes:
  postgres_data:
  redis_data:

networks:
  chat-network:
    driver: bridge
