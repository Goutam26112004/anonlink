version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: anon-chat-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-anondb}
      POSTGRES_USER: ${POSTGRES_USER:-anonuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-anonpassword}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-anonuser}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: anon-chat-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  coturn:
    image: instrumentisto/coturn:latest
    container_name: anon-chat-coturn
    restart: unless-stopped
    ports:
      - "3478:3478"
    volumes:
      - ./coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro

volumes:
  pgdata:
  redisdata:
