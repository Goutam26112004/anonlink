version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: anon-chat-db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-anondb}
      POSTGRES_USER: ${POSTGRES_USER:-anonuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-anonpassword}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-anonuser}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: anon-chat-redis
    restart: always
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: anon-chat-backend
    restart: always
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres_secure_pass}@db:5432/${DB_NAME:-anonchat}?schema=public
      REDIS_URL: redis://redis:6379
      PORT: 4000
      JWT_SECRET: ${JWT_SECRET:-jwt_default_prod_secret_key}
      CLIENT_URL: https://${DOMAIN_NAME:-localhost}
      COTURN_SHARED_SECRET: ${COTURN_SHARED_SECRET:-coturn_prod_secret}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL}
      RECAPTCHA_SECRET_KEY: ${RECAPTCHA_SECRET_KEY}
      FRONTEND_URL: https://${DOMAIN_NAME:-localhost}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:4000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_BACKEND_URL: https://${DOMAIN_NAME:-localhost}
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-mock-google-client-id}
    container_name: anon-chat-frontend
    restart: always
    environment:
      PORT: 3000
      NODE_ENV: production
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 3

  coturn:
    image: instrumentisto/coturn:latest
    container_name: anon-chat-coturn
    restart: always
    volumes:
      - ./coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
    network_mode: "host"

  nginx:
    image: nginx:alpine
    container_name: anon-chat-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend

  certbot:
    image: certbot/certbot
    container_name: anon-chat-certbot
    volumes:
      - ./certbot/www:/var/www/certbot:rw
      - ./certbot/conf:/etc/letsencrypt:rw
    entrypoint: "/bin/sh -c 'trap exit 0 SIGTERM; while :; do certbot renew; sleep 12h & wait $${!}; done'"

volumes:
  pgdata:
  redisdata:
